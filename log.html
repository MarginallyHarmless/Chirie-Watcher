<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scrape Log — Imobiliare Watcher</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@300;400;500;600&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #141416;
            --bg-card: #1c1c1f;
            --text-primary: #e8e6e3;
            --text-secondary: #9a9590;
            --text-muted: #5f5b56;
            --accent: #e8793a;
            --accent-light: rgba(232, 121, 58, 0.12);
            --border: #2a2a2d;
            --border-light: #222224;
            --radius: 12px;
            --radius-sm: 8px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text-primary);
            font-family: 'Libre Franklin', -apple-system, sans-serif;
            font-size: 15px;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        .header {
            padding: 20px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(20, 20, 22, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-light);
        }

        .header h1 {
            font-family: 'Fraunces', Georgia, serif;
            font-size: 24px;
            font-weight: 400;
            font-style: italic;
            color: var(--text-primary);
            letter-spacing: -0.02em;
        }

        .back-link {
            color: var(--text-muted);
            font-size: 13px;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--accent);
        }

        .log-container {
            padding: 24px 32px;
            max-width: 1000px;
            margin: 0 auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        th {
            text-align: left;
            color: var(--text-muted);
            font-weight: 500;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            padding: 10px 16px 10px 0;
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 10px 16px 10px 0;
            border-bottom: 1px solid var(--border-light);
            color: var(--text-secondary);
        }

        tr:hover td {
            color: var(--text-primary);
        }

        tr.error-row td {
            color: #f87171;
        }

        .error-msg {
            color: #f87171;
            font-size: 12px;
            padding: 4px 0 10px 0;
            opacity: 0.8;
        }

        .log-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }

        .log-badge.ok {
            background: rgba(42, 157, 78, 0.15);
            color: #4ade80;
        }

        .log-badge.err {
            background: rgba(248, 113, 113, 0.15);
            color: #f87171;
        }

        .empty-state {
            text-align: center;
            padding: 80px 24px;
            color: var(--text-muted);
            font-size: 15px;
        }

        .summary {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 16px;
        }

        @media (max-width: 768px) {
            .header { padding: 16px 20px; }
            .log-container { padding: 16px 20px; }
            .header h1 { font-size: 20px; }
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
    </style>
</head>
<body>
    <div class="header">
        <h1>Scrape Log</h1>
        <a class="back-link" href="/">← Back to dashboard</a>
    </div>
    <div class="log-container">
        <div class="summary" id="summary"></div>
        <div id="logTable"></div>
    </div>

    <script>
        function esc(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function formatDuration(seconds) {
            if (seconds == null) return '--';
            const m = Math.floor(seconds / 60);
            const s = Math.round(seconds % 60);
            return m > 0 ? `${m}m ${s}s` : `${s}s`;
        }

        async function fetchAndRender() {
            try {
                const resp = await fetch('/api/scrape-logs');
                const data = await resp.json();
                const logs = data.logs;

                document.getElementById('summary').textContent = `${logs.length} log entries`;

                if (!logs.length) {
                    document.getElementById('logTable').innerHTML = '<div class="empty-state">No scrape logs yet</div>';
                    return;
                }

                document.getElementById('logTable').innerHTML = `
                    <table>
                        <thead>
                            <tr>
                                <th>Time</th>
                                <th>Mode</th>
                                <th>Result</th>
                                <th>Duration</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${logs.map(log => `
                                <tr class="${log.status === 'error' ? 'error-row' : ''}">
                                    <td>${new Date(log.started_at).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' })}</td>
                                    <td>${esc(log.mode)}</td>
                                    <td>${log.new_listings} new${log.mode === 'normal' && (log.new_imobiliare || log.new_storia) ? ` <span style="opacity:0.6; font-size:0.85em">(${log.new_imobiliare} imob · ${log.new_storia} storia)</span>` : ''} / ${log.total_found} total</td>
                                    <td>${formatDuration(log.duration_seconds)}</td>
                                    <td>${log.status === 'success'
                                        ? '<span class="log-badge ok">OK</span>'
                                        : '<span class="log-badge err">ERROR</span>'}</td>
                                </tr>
                                ${log.error_message ? `
                                <tr class="error-row">
                                    <td colspan="5" class="error-msg">${esc(log.error_message)}</td>
                                </tr>` : ''}
                            `).join('')}
                        </tbody>
                    </table>
                `;
            } catch (e) {
                console.error('Failed to fetch scrape logs:', e);
            }
        }

        fetchAndRender();
        setInterval(fetchAndRender, 60000);
    </script>
</body>
</html>
