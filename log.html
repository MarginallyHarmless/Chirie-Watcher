<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scrape Log — Imobiliare Watcher</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a0a;
            color: #c0c0c0;
            font-family: 'IBM Plex Mono', 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.5;
        }

        .header {
            background: #111;
            border-bottom: 1px solid #222;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header h1 {
            color: #00ff41;
            font-size: 18px;
            font-weight: 600;
        }

        .back-link {
            color: #888;
            font-size: 12px;
            text-decoration: none;
            border: 1px solid #333;
            padding: 6px 12px;
            border-radius: 4px;
        }

        .back-link:hover {
            border-color: #00ff41;
            color: #00ff41;
        }

        .log-container {
            padding: 16px 24px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        th {
            text-align: left;
            color: #555;
            font-weight: 400;
            padding: 8px 16px 8px 0;
            border-bottom: 1px solid #222;
        }

        td {
            padding: 8px 16px 8px 0;
            border-bottom: 1px solid #1a1a1a;
        }

        tr.error-row {
            border-left: 3px solid #ff4141;
        }

        tr.error-row td {
            color: #ff4141;
        }

        .error-msg {
            color: #ff4141;
            font-size: 12px;
            padding: 2px 0 8px 0;
        }

        .log-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 11px;
        }

        .log-badge.ok {
            background: #002200;
            color: #00ff41;
        }

        .log-badge.err {
            background: #220000;
            color: #ff4141;
        }

        .empty-state {
            text-align: center;
            padding: 48px;
            color: #555;
        }

        .summary {
            font-size: 12px;
            color: #555;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>// scrape log</h1>
        <a class="back-link" href="/">&lt; Back to dashboard</a>
    </div>
    <div class="log-container">
        <div class="summary" id="summary"></div>
        <div id="logTable"></div>
    </div>

    <script>
        function esc(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function formatDuration(seconds) {
            if (seconds == null) return '--';
            const m = Math.floor(seconds / 60);
            const s = Math.round(seconds % 60);
            return m > 0 ? `${m}m ${s}s` : `${s}s`;
        }

        async function fetchAndRender() {
            try {
                const resp = await fetch('/api/scrape-logs');
                const data = await resp.json();
                const logs = data.logs;

                document.getElementById('summary').textContent = `${logs.length} log entries`;

                if (!logs.length) {
                    document.getElementById('logTable').innerHTML = '<div class="empty-state">No scrape logs yet</div>';
                    return;
                }

                document.getElementById('logTable').innerHTML = `
                    <table>
                        <thead>
                            <tr>
                                <th>Time</th>
                                <th>Mode</th>
                                <th>Result</th>
                                <th>Duration</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${logs.map(log => `
                                <tr class="${log.status === 'error' ? 'error-row' : ''}">
                                    <td>${new Date(log.started_at).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' })}</td>
                                    <td>${esc(log.mode)}</td>
                                    <td>${log.new_listings} new / ${log.total_found} total</td>
                                    <td>${formatDuration(log.duration_seconds)}</td>
                                    <td>${log.status === 'success'
                                        ? '<span class="log-badge ok">OK</span>'
                                        : '<span class="log-badge err">ERROR</span>'}</td>
                                </tr>
                                ${log.error_message ? `
                                <tr class="error-row">
                                    <td colspan="5" class="error-msg">${esc(log.error_message)}</td>
                                </tr>` : ''}
                            `).join('')}
                        </tbody>
                    </table>
                `;
            } catch (e) {
                console.error('Failed to fetch scrape logs:', e);
            }
        }

        fetchAndRender();
        setInterval(fetchAndRender, 60000);
    </script>
</body>
</html>
